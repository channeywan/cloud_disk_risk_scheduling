target_metric: bandwidth
data:
  trace_path: /data/tidal_info/cluster_trace_db/all_aligned_trace.pkl
  points_per_day: 288
  total_days: 7
  min_scale: 1.0
  max_disks: null
sampling:
  lstm_train_stride: 6
  lightgbm_train_stride: 1
  eval_stride: 1
  lstm_max_train_windows: 2000000
  random_seed: 42
compute:
  feature_workers: 16
  feature_chunk_disks: 256
  scheduling_workers: 16
  lstm_dataloader_workers: 8
lightgbm:
  n_estimators: 400
  learning_rate: 0.05
  num_leaves: 31
  max_depth: -1
  n_jobs: 32
lstm:
  hidden_size: 64
  num_layers: 1
  dropout: 0.0
  batch_size: 256
  epochs: 20
  learning_rate: 0.001
  patience: 3
  pin_memory: true
conformal:
  alpha: 0.1
  error_scale:
    a_min: 1.0
    train_stride: 6
    n_estimators: 200
    learning_rate: 0.05
    num_leaves: 31
    max_depth: -1
    n_jobs: 32
scheduling:
  node_number: 100
  risk_lambda: 0.25
  capacity_ratio: 1.2
  capacity_candidates: [1.1, 1.2, 1.3, 1.4, 1.5]
  risk_lambda_candidates: [0.0, 0.25, 0.5, 0.75, 1.0]
output:
  root: results
